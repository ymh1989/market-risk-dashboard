name: Update market risk data

on:
  workflow_dispatch:
  schedule:
    # 16:10 KST on weekdays, after the Korean cash market close.
    - cron: "10 7 * * 1-5"

permissions:
  contents: write

jobs:
  update-market-risk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh market risk data
        run: |
          make update-market-risk
          make backtest-market-risk

      - name: Validate dashboard data
        run: make test

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/risk-dashboard.json data/market-risk-snapshot.json data/market-risk-timeseries.json data/market-risk-backtest.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update market risk data"
            git push
          fi
