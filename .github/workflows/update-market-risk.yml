name: Update market risk data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market-risk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Refresh market risk data
        run: |
          make update-market-risk
          make backtest-market-risk
          REFRESH_STRESS_CACHE=1 make analyze-stress-episodes
          python3 scripts/export_els_index_risk.py
          python3 scripts/export_hmm_regime.py

      - name: Refresh ML risk-off signal
        run: |
          python3 -m kospi_risk.cli fetch-market-data --source-config configs/data_sources.yaml --output data/raw/market_data.csv --metadata data/raw/market_data_sources.json --min-rows 1500
          python3 -m kospi_risk.cli build-features --input data/raw/market_data.csv --output data/processed/features.parquet --config configs/base.yaml
          python3 -m kospi_risk.cli train --features data/processed/features.parquet --config configs/base.yaml
          python3 -m kospi_risk.cli backtest --features data/processed/features.parquet --config configs/base.yaml --output reports/backtest_report.md
          python3 -m kospi_risk.cli predict-latest --features data/processed/features.parquet --config configs/base.yaml --output reports/latest_signal.csv
          python3 scripts/export_ml_risk_signal.py

      - name: Validate dashboard data
        run: make test

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/risk-dashboard.json data/market-risk-snapshot.json data/market-risk-timeseries.json data/market-risk-backtest.json data/market-stress-episodes.json data/market-history-cache.json data/els-index-risk.json data/ml-risk-signal.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update market risk data"
            git push
          fi
