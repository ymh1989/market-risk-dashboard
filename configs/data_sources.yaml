fetch:
  provider: yahoo
  interval: 1d
  start: "1996-01-01"
  timeout_seconds: 20
  user_agent: "Mozilla/5.0 (compatible; kospi-risk-regime-lab/0.1)"
  alignment: left
  min_optional_coverage_ratio: 0.6

required:
  KOSPI:
    provider: yahoo
    symbol: "^KS11"
    label: "KOSPI Composite Index"
    supplements:
      - provider: naver
        symbol: "KOSPI"
        label: "KOSPI Composite Index"
  SPX:
    provider: yahoo
    symbol: "^GSPC"
    label: "S&P 500 Index"
  SOX:
    provider: yahoo
    symbol: "^SOX"
    label: "Philadelphia Semiconductor Index"
  USDKRW:
    provider: yahoo
    symbol: "KRW=X"
    label: "USD/KRW"

optional:
  VIX:
    provider: yahoo
    symbol: "^VIX"
    label: "CBOE Volatility Index"
  NASDAQ:
    provider: yahoo
    symbol: "^IXIC"
    label: "NASDAQ Composite"
  NIKKEI225:
    provider: yahoo
    symbol: "^N225"
    label: "Nikkei 225"
  CSI300:
    provider: yahoo
    symbol: "000300.SS"
    label: "CSI 300"
    min_coverage_ratio: 0.1
  US10Y:
    provider: yahoo
    symbol: "^TNX"
    label: "US 10Y Treasury Yield"
  US2Y:
    provider: fred
    symbol: "DGS2"
    cache_key: us2y
    label: "US 2Y Treasury Constant Maturity Rate"
  US_YIELD_CURVE_10Y2Y:
    provider: fred
    symbol: "T10Y2Y"
    cache_key: us_yield_curve_10y2y
    label: "US 10Y minus 2Y Treasury Spread"
  US_HIGH_YIELD_OAS:
    provider: fred
    symbol: "BAMLH0A0HYM2"
    cache_key: us_high_yield_oas
    label: "ICE BofA US High Yield OAS"
    min_coverage_ratio: 0.05
  US_FINANCIAL_STRESS_STLFSI:
    provider: fred
    symbol: "STLFSI4"
    cache_key: us_financial_stress_stlfsi
    label: "St. Louis Fed Financial Stress Index"
    min_coverage_ratio: 0.05
  US_FINANCIAL_CONDITIONS_NFCI:
    provider: fred
    symbol: "NFCI"
    cache_key: us_financial_conditions_nfci
    label: "Chicago Fed National Financial Conditions Index"
    min_coverage_ratio: 0.05
  WTI:
    provider: yahoo
    symbol: "CL=F"
    label: "WTI Crude Oil Futures"
  COPPER:
    provider: yahoo
    symbol: "HG=F"
    label: "Copper Futures"
  GOLD:
    provider: yahoo
    symbol: "GC=F"
    label: "Gold Futures"
