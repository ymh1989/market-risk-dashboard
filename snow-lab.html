<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#05090a" />
    <title>Field Lab</title>
    <link rel="stylesheet" href="./src/snow-lab.css?v=20260724-3" />
  </head>
  <body>
    <main class="snow-lab" data-snow-lab data-mode="snow">
      <section class="snow-lab__stage" data-lab-stage aria-label="GPU 유체장 시뮬레이션">
        <canvas class="snow-lab__fluid" data-fluid-canvas aria-hidden="true"></canvas>
        <canvas class="snow-lab__particles" data-field-canvas aria-hidden="true"></canvas>

        <header class="snow-lab__toolbar">
          <a class="snow-lab__icon-button" href="./" aria-label="대시보드로 돌아가기" title="대시보드로 돌아가기">←</a>
          <div class="snow-lab__identity">
            <span data-lab-eyebrow>Navier–Stokes Field</span>
            <h1 data-lab-title>Snow Lab</h1>
          </div>
          <div class="snow-lab__controls">
            <div class="snow-lab__mode" role="group" aria-label="장면 선택">
              <button type="button" data-mode-select="snow">눈</button>
              <button type="button" data-mode-select="wave">파도</button>
              <button type="button" data-mode-select="spectrum">스펙트럼</button>
              <button type="button" data-mode-select="forest">숲</button>
            </div>
            <div class="snow-lab__quality" role="group" aria-label="시뮬레이션 품질">
              <button type="button" data-quality="auto">자동</button>
              <button type="button" data-quality="high">고화질</button>
              <button type="button" data-quality="eco">절전</button>
            </div>
            <button class="snow-lab__icon-button" type="button" data-snow-reset aria-label="시뮬레이션 초기화" title="초기화">↻</button>
            <button class="snow-lab__icon-button" type="button" data-snow-pause aria-label="시뮬레이션 일시정지" title="일시정지">Ⅱ</button>
          </div>
        </header>

        <footer class="snow-lab__status">
          <span class="snow-lab__live-dot" aria-hidden="true"></span>
          <strong data-snow-status>GPU 유체장 준비중</strong>
          <small data-snow-profile>자동 품질</small>
        </footer>
      </section>
    </main>
    <script type="module" src="./src/snow-lab.js?v=20260724-3"></script>
  </body>
</html>
